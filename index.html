<script>
firebase.initializeApp({
  apiKey:"AIzaSyD9rrcx23hSLHY2XFLAWmtvIzE8vcs8ThI",
  authDomain:"qb3qb-3f668.firebaseapp.com",
  projectId:"qb3qb-3f668",
  storageBucket:"qb3qb-3f668.firebasestorage.app",
  messagingSenderId:"9334197426",
  appId:"1:9334197426:web:482f1ed44b03cf00264dab"
});
const _auth = firebase.auth();
const _db   = firebase.firestore();
let _uid = null;

_auth.onAuthStateChanged(user => {
  _uid = user ? user.uid : null;
  const btn     = document.getElementById('login-btn');
  const userInfo= document.getElementById('user-info');
  const userEmail=document.getElementById('user-email');
  if (user) {
    if (btn)       btn.style.display = 'none';
    if (userInfo)  userInfo.style.display = 'flex';
    if (userEmail) userEmail.textContent = user.email;
    _loadFromFirestore();
  } else {
    if (btn)       btn.style.display = 'flex';
    if (userInfo)  userInfo.style.display = 'none';
    if (typeof curPage !== 'undefined' && curPage === 'notebook') showPage('practice');
  }
  // DOM 可能還未就緒，用重試確保按鈕顯示正確
  (function tryUpdateNbNav(attempts){
    const nbNav = document.getElementById('nav-notebook');
    if (!nbNav) { if(attempts>0) setTimeout(()=>tryUpdateNbNav(attempts-1), 100); return; }
    nbNav.style.display = user ? '' : 'none';
  })(20);
});

function _openLoginModal() {
  document.getElementById('login-modal').style.display = 'flex';
  document.getElementById('login-email').focus();
}
function _closeLoginModal() {
  document.getElementById('login-modal').style.display = 'none';
  document.getElementById('login-err').textContent = '';
}
async function _submitLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw    = document.getElementById('login-pw').value;
  const err   = document.getElementById('login-err');
  if (!email || !pw) { err.textContent = '請填寫信箱和密碼'; return; }
  try {
    await _auth.signInWithEmailAndPassword(email, pw);
    _closeLoginModal();
  } catch(e) {
    const msgs = {
      'auth/invalid-email': '信箱格式不正確',
      'auth/user-not-found': '帳號不存在',
      'auth/wrong-password': '密碼錯誤',
      'auth/invalid-credential': '信箱或密碼錯誤',
    };
    err.textContent = msgs[e.code] || e.message;
  }
}
function _logout() {
  if (confirm('確定登出？')) _auth.signOut();
}

let _syncTimer = null;
function _setSyncState(state, text) {
  const btn = document.getElementById('sync-btn');
  const ico = document.getElementById('sync-icon');
  const lbl = document.getElementById('sync-text');
  if (!btn) return;
  btn.className = 'sync-btn ' + state;
  btn.style.display = 'flex';
  lbl.textContent = text;
  const icons = {
    saving: '<polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>',
    ok:     '<polyline points="20 6 9 17 4 12"/>',
    fail:   '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  };
  ico.innerHTML = icons[state] || icons.saving;
  clearTimeout(_syncTimer);
  if (state !== 'saving') _syncTimer = setTimeout(() => { btn.style.display = 'none'; }, 3000);
}
async function _saveToFirestore(key, data) {
  if (!_uid) return;
  _setSyncState('saving', '儲存中');
  try {
    await _db.collection('users').doc(_uid).collection('data').doc(key).set(data, {merge:true});
    _setSyncState('ok', '已儲存');
  } catch(e) {
    _setSyncState('fail', '儲存失敗');
  }
}

async function _loadFromFirestore() {
  if (!_uid) return;
  try {
    const snap = await _db.collection('users').doc(_uid).collection('data').get();
    snap.forEach(doc => { localStorage.setItem(doc.id, JSON.stringify(doc.data())); });
    if (typeof updateStats === 'function') updateStats();
    if (typeof renderWrong === 'function' && typeof curPage !== 'undefined' && curPage === 'wrong') renderWrong();
    if (typeof renderAnalysis === 'function' && typeof curPage !== 'undefined' && curPage === 'analysis') renderAnalysis();
    if (typeof renderLevel === 'function') renderLevel();
    if (typeof renderWallet === 'function') renderWallet();
    showToast('雲端同步完成 ☁️');
  } catch(e) {}
}
</script>

.anki-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:.6rem .9rem;background:#f5f5f2;border-radius:10px;border:1px solid rgba(0,0,0,.1);margin-bottom:.9rem}
body.dark .anki-bar{background:#242428;border-color:rgba(255,255,255,.1)}
.anki-bar label{font-size:12px;color:#888;white-space:nowrap}
.anki-bar input{font-size:12px;padding:5px 9px;border:1px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;color:#1a1a2e;outline:none;width:150px;min-height:auto}
body.dark .anki-bar input{background:#1a1a1e;color:#f0f0f0;border-color:rgba(255,255,255,.2)}
.anki-status{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500}
.anki-status.ok{background:#f0fdf4;color:#16a34a}
.anki-status.err{background:#fff5f5;color:#dc2626}
.btn-anki{font-size:12px;padding:6px 12px;cursor:pointer;border-radius:8px;border:1px solid #d4a017;background:#fff8e6;color:#7a4f00;font-weight:600}
.btn-anki:hover{background:#ffe9a0}
body.dark .btn-anki{background:#3a2e00;color:#ffd566;border-color:#7a5f00}
.btn-nb-save{background:var(--accent,#4f7df3);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer}
.btn-nb-correct{background:#22c55e;color:#fff;border:none;border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer}
.btn-nb-uncorrect{background:#f0fdf4;color:#16a34a;border:1px solid #22c55e;border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer}
.btn-nb-del{background:#fff5f5;color:#dc2626;border:1px solid #ef4444;border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer}
.lv-card{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:14px;padding:16px 20px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden}
.lv-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(79,125,243,.15),rgba(124,58,237,.15));pointer-events:none}
.lv-badge{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#4f7df3,#7c3aed);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 16px rgba(79,125,243,.4);border:2px solid rgba(255,255,255,.2)}
.lv-badge .lv-num{font-size:11px;font-weight:800;line-height:1;letter-spacing:.5px;opacity:.8}
.lv-badge .lv-val{font-size:20px;font-weight:900;line-height:1.1}
.lv-info{flex:1;min-width:0}
.lv-title{font-size:14px;font-weight:700;color:#c4b5fd;margin-bottom:4px}
.lv-exp-row{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.6);margin-bottom:6px}
.lv-bar-wrap{height:8px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden}
.lv-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#4f7df3,#7c3aed);transition:width .6s ease}
.lv-total-exp{font-size:10px;color:rgba(255,255,255,.4);margin-top:5px}
.lv-999 .lv-badge{background:linear-gradient(135deg,#f59e0b,#ef4444);box-shadow:0 4px 20px rgba(245,158,11,.5)}
.lv-999 .lv-bar-fill{background:linear-gradient(90deg,#f59e0b,#ef4444)}
.lv-999 .lv-title{color:#fcd34d}
@keyframes lvup{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.lv-badge.lvup{animation:lvup .5s ease}
.wallet-box{display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.08);border-radius:12px;padding:10px 16px;border:1px solid rgba(255,255,255,.15);flex-shrink:0;min-width:80px}
.wallet-icon{font-size:22px;line-height:1;margin-bottom:4px}
.wallet-amount{font-size:18px;font-weight:900;color:#fcd34d;letter-spacing:.5px}
.wallet-label{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px}
@keyframes coinpop{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-48px) scale(1.3)}}
.coin-pop{position:fixed;font-size:16px;font-weight:800;color:#fcd34d;pointer-events:none;z-index:9999;animation:coinpop .9s ease forwards;text-shadow:0 2px 8px rgba(0,0,0,.4)}

/* PWA Standalone */
@media (display-mode: standalone) {
  .top-bar-wrap{top:env(safe-area-inset-top)!important}
  body{padding-top:calc(54px + env(safe-area-inset-top))!important}
  .nav-bar{position:fixed!important;bottom:0!important;left:0!important;right:0!important;z-index:9999!important;padding-bottom:env(safe-area-inset-bottom)!important;height:calc(62px + env(safe-area-inset-bottom))!important;background:#fff}
  body.dark .nav-bar{background:#111111!important}
  body{padding-bottom:calc(72px + env(safe-area-inset-bottom))!important}
  #quiz-overlay{padding-bottom:calc(82px + env(safe-area-inset-bottom))!important}
  #result-overlay{padding-bottom:calc(90px + env(safe-area-inset-bottom))!important}
}

/* iOS tap 取消高亮 */
*{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
button,select,input{-webkit-appearance:none;appearance:none}

/* iOS safe area */
body{
  padding-top:calc(54px + env(safe-area-inset-top));
  padding-bottom:calc(70px + env(safe-area-inset-bottom));
}
#subject-select{
  padding-left:calc(12px + env(safe-area-inset-left));
}
.nav-bar{
  padding-bottom:env(safe-area-inset-bottom);
  height:calc(62px + env(safe-area-inset-bottom));
}

/* iOS form 防止自動放大 */
select,input[type=number]{font-size:16px}

/* 觸控友善 */
.btn-primary{min-height:52px;font-size:16px}
.option-btn{min-height:52px;font-size:15px;padding:14px 16px}
#subject-select{min-height:38px}
.filter-chip{min-height:36px}
.nav-btn{min-height:44px}

/* 手機 */
@media(max-width:430px){
  .top-bar-wrap{height:48px}
  .top-controls{padding:0 calc(8px + env(safe-area-inset-right)) 0 4px;gap:3px}
  body{padding-top:calc(48px + env(safe-area-inset-top))}
  #subject-select{font-size:13px;padding:6px 26px 6px 10px}
  .page{padding:12px 12px 0}
  .card{padding:18px 14px;border-radius:14px}
  .page-header{font-size:18px;margin-bottom:12px}
  .stat-box{padding:12px 6px}
  .stat-box .num{font-size:22px}
  .question-card{padding:18px 14px}
  .question-text{font-size:15px;margin-bottom:16px}
  .option-btn{font-size:14px;padding:12px 13px;gap:10px}
  .option-label{width:24px;height:24px;font-size:11px;flex-shrink:0}
  .wq-card{padding:14px 14px 10px}
  .wq-question{font-size:13px}
  .wq-option{font-size:12px;padding:8px 10px}
  .result-inner{padding:14px 12px}
  .quiz-inner{padding:10px 12px}
  .result-card{padding:20px 16px}
}

/* iPad */
@media(min-width:768px){
  body{padding-top:calc(62px + env(safe-area-inset-top));padding-bottom:calc(80px + env(safe-area-inset-bottom));}
  .top-bar-wrap{height:62px}
  .top-controls{padding:0 32px 0 8px;gap:8px}
  body{padding-top:calc(62px + env(safe-area-inset-top))}
  #subject-select{font-size:15px;padding:9px 30px 9px 16px}
  .dark-toggle{width:42px;height:42px;font-size:20px}
  .nav-bar{height:calc(76px + env(safe-area-inset-bottom))}
  .nav-btn{font-size:13px;gap:5px}
  .nav-btn svg{width:26px;height:26px}
  .page{padding:24px 32px 0;max-width:780px}
  .card{padding:26px 24px;border-radius:18px;margin-bottom:16px}
  .page-header{font-size:24px;margin-bottom:20px}
  .stat-row{gap:14px;margin-bottom:18px}
  .stat-box{padding:18px 12px;border-radius:16px}
  .stat-box .num{font-size:30px}
  .stat-box .lbl{font-size:13px}
  .setting-label{font-size:13px}
  select,input[type=number]{padding:13px 16px;font-size:16px;border-radius:12px}
  .btn-primary{padding:17px;font-size:17px;border-radius:14px;min-height:58px}
  .quiz-inner{padding:20px 32px;max-width:780px}
  .question-card{padding:32px 28px;border-radius:20px}
  .question-text{font-size:18px;line-height:1.7;margin-bottom:24px}
  .option-btn{padding:16px 20px;font-size:16px;border-radius:14px;gap:14px;min-height:58px}
  .option-label{width:32px;height:32px;font-size:14px}
  .exam-tag{font-size:12px}
  .feedback{font-size:16px;padding:14px 18px}
  .btn-next{font-size:17px;padding:16px;border-radius:14px;min-height:56px}
  .btn-quit{font-size:14px}
  .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .result-inner{padding:28px 32px;max-width:780px}
  .result-card{padding:32px 28px;border-radius:22px}
  .score-circle{width:96px;height:96px}
  .score-circle .num{font-size:32px}
  .score-info h2{font-size:22px}
  .score-info .detail{font-size:15px}
  .wrong-header h2,.analysis-header h2{font-size:24px}
  .wq-card{padding:22px 22px 14px;border-radius:16px}
  .wq-question{font-size:15px}
  .wq-option{font-size:13px;padding:10px 14px}
  .filter-chip{padding:7px 16px;font-size:13px}
  .wrong-filter{gap:10px;margin-bottom:16px}
  svg.radar{width:340px;height:340px}
}

/* iPad Pro */
@media(min-width:1024px){
  .page,.quiz-inner,.result-inner{max-width:960px;padding-left:48px;padding-right:48px}
  .question-text{font-size:20px}
  .option-btn{font-size:17px}
}

/* 桌機大螢幕（護眼設定） */
@media(min-width:1280px){
  .page,.quiz-inner,.result-inner{max-width:860px} /* 限制行寬，避免眼睛掃太遠 */
  .question-text{font-size:19px;line-height:1.85;margin-bottom:26px;letter-spacing:.01em}
  .option-btn{font-size:16px;padding:16px 20px;border-radius:13px;min-height:58px;line-height:1.6;gap:14px}
  .option-label{width:34px;height:34px;font-size:14px}
  .exam-tag{font-size:13px;padding:4px 10px}
  .kw-tag{font-size:12px;padding:3px 10px}
  .feedback{font-size:16px;padding:13px 18px;line-height:1.6}
  .btn-next{font-size:17px;padding:16px;border-radius:14px}
  .question-card{padding:36px 36px}
  .card{padding:28px 28px}
  .page-header{font-size:24px}
  .stat-box .num{font-size:30px}
  .stat-box .lbl{font-size:13px}
  .setting-label{font-size:14px}
  select,input[type=number]{font-size:16px;padding:14px 16px}
  .btn-primary{font-size:17px;padding:17px;min-height:60px}
}

/* 深色切換按鈕 */
.dark-toggle{flex-shrink:0;margin-left:auto;width:36px;height:36px;border-radius:50%;border:none;background:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.dark-toggle:hover{background:rgba(128,128,128,.15)}

/* 雲端存檔狀態按鈕 */
.sync-btn{flex-shrink:0;height:30px;padding:0 10px;border-radius:99px;border:1.5px solid #e0e0e0;background:#fff;font-size:12px;font-weight:700;cursor:default;display:none;align-items:center;gap:5px;transition:all .4s;white-space:nowrap}
.sync-btn.saving{border-color:#93c5fd;background:#eff6ff;color:#1d4ed8}
.sync-btn.ok    {border-color:#86efac;background:#f0fdf4;color:#15803d}
.sync-btn.fail  {border-color:#fca5a5;background:#fff5f5;color:#b91c1c}
.sync-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.sync-btn.saving svg{animation:spin .8s linear infinite}
body.dark .sync-btn{background:#111111;border-color:#2a2a2a;color:#aaa}
body.dark .sync-btn.saving{border-color:#1e3a5f;background:#0c1a2e;color:#60a5fa}
body.dark .sync-btn.ok    {border-color:#166534;background:#052e16;color:#4ade80}
body.dark .sync-btn.fail  {border-color:#7f1d1d;background:#1a0000;color:#f87171}

/* 瀏覽人次 */
.visit-counter{flex-shrink:0;display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:#888;white-space:nowrap;padding:0 4px}
.visit-counter svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
body.dark .visit-counter{color:#5a5a80}

/* 頂部重置按鈕 */
.reset-top-btn{flex-shrink:0;width:32px;height:32px;border-radius:50%;border:1.5px solid #fca5a5;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#ef4444;transition:all .2s}
.reset-top-btn:hover{background:#fee2e2;border-color:#ef4444}
.reset-top-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
body.dark .reset-top-btn{border-color:#7f1d1d;color:#f87171}
body.dark .reset-top-btn:hover{background:#450a0a;border-color:#f87171}

/* 登入按鈕 */
.login-btn{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:99px;border:1.5px solid #e0e0e0;background:#fff;font-size:12px;font-weight:700;color:#444;cursor:pointer;white-space:nowrap;transition:all .2s}
.login-btn:hover{border-color:#4f7df3;color:#4f7df3}
body.dark .login-btn{background:#1e1e1e;border-color:#2a2a2a;color:#aaa}
.user-info{display:flex;align-items:center;gap:6px;flex-shrink:0}
.user-email{font-size:11px;font-weight:600;color:#555;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
body.dark .user-email{color:#aaa}
.logout-btn{font-size:11px;font-weight:700;color:#ef4444;background:none;border:1.5px solid #fca5a5;border-radius:99px;padding:4px 10px;cursor:pointer;white-space:nowrap}
.logout-btn:hover{background:#fff5f5}
body.dark .logout-btn{border-color:#7f1d1d;color:#f87171}

/* 登入 Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 40px rgba(0,0,0,.18)}
body.dark .modal-box{background:#111111;color:#dcdcf0}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.modal-header span{font-size:18px;font-weight:800}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:#888;line-height:1}
.modal-input{border:1.5px solid #e0e0e0;border-radius:10px;padding:12px 14px;font-size:15px;outline:none;transition:border-color .2s}
.modal-input:focus{border-color:#4f7df3}
body.dark .modal-input{background:#1e1e1e;border-color:#2a2a2a;color:#dcdcf0}
.modal-err{font-size:13px;color:#ef4444;min-height:16px;font-weight:600}
.modal-submit{background:#4f7df3;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s}
.modal-submit:hover{background:#3a66d8}

/* Toast */
.toast{position:fixed;top:calc(62px + env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-10px);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:99999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
body.dark .toast{background:#e0e0f0;color:#1a1a2e}

/* 特訓區 */
.drill-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.drill-header h2{font-size:20px;font-weight:800}
.drill-conquered{background:#22c55e;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px}
.drill-section-title{font-size:12px;font-weight:700;color:#aaa;letter-spacing:.5px;margin-bottom:12px}
.drill-chips{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:18px}
.drill-chip{padding:9px 14px;border-radius:12px;border:2px solid;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s;line-height:1.4;display:flex;align-items:center;gap:7px}
.drill-chip:active{transform:scale(.97)}
.drill-chip-count{font-size:11px;font-weight:800;padding:2px 7px;border-radius:99px;background:rgba(0,0,0,.08);flex-shrink:0}
.drill-chip.has-wrong .drill-chip-count{background:#ef4444;color:#fff}
.drill-chip.all-conquered .drill-chip-count{background:#22c55e;color:#fff}
.drill-chip.empty{opacity:.4;cursor:default}
.drill-hint{text-align:center;padding:18px;color:#aaa;font-size:13px;font-weight:600}
.drill-empty{text-align:center;padding:40px 20px;color:#bbb;font-size:13px;line-height:1.8}
.drill-mode-banner{background:linear-gradient(90deg,#7c3aed,#4f7df3);color:#fff;font-size:12px;font-weight:700;padding:8px 14px;border-radius:10px;margin-bottom:12px;display:none;align-items:center;gap:7px}
.drill-mode-banner svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;flex-shrink:0}
body.dark .drill-chip{border-color:rgba(255,255,255,.08)}
body.dark .drill-chip-count{background:rgba(255,255,255,.12)}
body.dark .drill-chip.has-wrong .drill-chip-count{background:#ef4444;color:#fff}
body.dark .drill-hint{color:#5a5a80}

/* 模擬考整體計時器 */
.mock-exam-timer{font-size:15px;font-weight:800;padding:4px 12px;border-radius:99px;background:#e0f2fe;color:#0369a1;letter-spacing:1px;display:none;flex-shrink:0}
.mock-exam-timer.warn{background:#fef3c7;color:#d97706}
.mock-exam-timer.danger{background:#fee2e2;color:#dc2626;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
body.dark .mock-exam-timer{background:#0c2a40;color:#38bdf8}
body.dark .mock-exam-timer.warn{background:#451a03;color:#fbbf24}
body.dark .mock-exam-timer.danger{background:#450a0a;color:#f87171}

/* 模擬考頁面 */
.mock-info-row{display:flex;gap:8px;margin-bottom:16px}
.mock-info-box{flex:1;background:#f0f9ff;border-radius:13px;padding:14px 8px;text-align:center;border:1.5px solid #bae6fd}
.mock-info-box .num{font-size:24px;font-weight:800;color:#0369a1}
.mock-info-box .lbl{font-size:11px;color:#0ea5e9;margin-top:2px}
body.dark .mock-info-box{background:#0c2233;border-color:#1e4060}
body.dark .mock-info-box .num{color:#38bdf8}
body.dark .mock-info-box .lbl{color:#0ea5e9}

/* ── 深色模式 ── */
body.dark{background:#000000;color:#dcdcf0}
body.dark .nav-bar{background:#111111;border-color:#2a2a2a;box-shadow:0 -2px 12px rgba(0,0,0,.4)}
body.dark .nav-btn{color:#9090b8}
body.dark .dark-toggle:hover{background:rgba(255,255,255,.08)}
body.dark .page-header,body.dark .analysis-header h2,body.dark .wrong-header h2{color:#dcdcf0}
body.dark .setting-label{color:#7070a0}
body.dark .section-title{color:#b0b0d0}
body.dark .section-sub{color:#507078}
body.dark .legend{color:#7070a0}
body.dark .score-info h2{color:#dcdcf0}
body.dark .score-info .detail{color:#7070a0}
body.dark .card,body.dark .stat-box,body.dark .question-card,body.dark .result-card,body.dark .wq-card{background:#111111;box-shadow:0 2px 16px rgba(0,0,0,.35)}
body.dark .stat-box .lbl{color:#5a5a80}
body.dark .stat-box .num{color:#dcdcf0}
body.dark select,body.dark input[type=number]{background:#1e1e1e;border-color:#2a2a2a;color:#dcdcf0}
body.dark select:focus,body.dark input:focus{border-color:var(--accent)}
body.dark .btn-clear{background:#1e1e1e;border-color:#2a2a2a;color:#7070a0}
body.dark .btn-next{background:#1e1e1e;color:#dcdcf0}
body.dark .btn-quit{color:#5a5a80}
body.dark .btn-primary:not(.btn-danger){box-shadow:0 0 18px rgba(100,120,255,.25);color:#000!important;}
body.dark .btn-primary:not(.btn-danger):hover{box-shadow:0 0 24px rgba(100,120,255,.4);color:#000!important;}
body.dark #quiz-overlay,body.dark #result-overlay{background:#000000}
body.dark .exam-tag{background:#1e1e1e;color:#7070a0}
body.dark .progress-bar-wrap{background:#1e1e1e}
body.dark .option-btn{background:#1e1e1e;border-color:#2a2a2a;color:#dcdcf0}

const DATA_MAP = {
  adminlaw: typeof DATA_ADMINLAW!=='undefined'?DATA_ADMINLAW:[],
  faxu:     typeof DATA_FAXU!=='undefined'?DATA_FAXU:[],
  adminsci: typeof DATA_ADMINSCI!=='undefined'?DATA_ADMINSCI:[],

const DIFFICULTY = new Set(['非常簡單','簡單','適中','困難','非常困難','計算中']);

// ── 狀態 ────────────────────────────────────────────────
let curSubjId = SUBJECTS[0].id;
let curSubj   = SUBJECTS[0];
let curGroups = GROUPS_MAP[curSubjId];
let allQ = [];

function qHash(q){let h=0;for(const c of(q.question||''))h=(Math.imul(31,h)+c.charCodeAt(0))|0;return Math.abs(h).toString(36)}
function tagQ(q){
  const txt=(q.question||'')+Object.values(q.options||{}).join('');
  const m=curGroups.filter(g=>g.keywords.some(kw=>txt.includes(kw))).map(g=>g.name);
  return m.length?m:['其他'];
}

// ── 初始化科目 ──────────────────────────────────────────
function initSubject(id){
  curSubjId = id;
  curSubj   = SUBJECTS.find(s=>s.id===id);
  curGroups = GROUPS_MAP[id];

  document.documentElement.style.setProperty('--accent', curSubj.color);
  document.documentElement.style.setProperty('--bg', curSubj.bg);
  if (!document.body.classList.contains('dark')) document.body.style.background = curSubj.bg;

  // 同步下拉選單選項與背景色
  const sel = document.getElementById('subject-select');
  if(sel){ sel.value = id; sel.style.background = curSubj.color; }

  document.querySelectorAll('.nav-btn.active').forEach(b=>{b.style.color=curSubj.color});
  document.querySelector('.nav-bar').style.setProperty('--nb-color', curSubj.color);

  document.getElementById('page-title').textContent = curSubj.icon+' '+curSubj.name+'題庫';
  document.getElementById('btn-start').style.background = curSubj.color;
  document.getElementById('mock-btn-start').style.background = curSubj.color;

  const raw = DATA_MAP[id]||[];
  allQ = raw.filter(q=>
    q.question&&q.question.length>5&&
    q.options&&Object.keys(q.options).length>=2&&
    !DIFFICULTY.has(q.question)
  ).map(q=>({...q,groups:tagQ(q),id:qHash(q)}));
  document.getElementById('stat-total-q').textContent = allQ.length;

  // 年度選單（練習 + 模擬考共用）
  const yearOpts = [...new Set(allQ.map(q=>{const m=q.exam.match(/^(\d+)年/);return m?m[1]+'年':null}).filter(Boolean))].sort((a,b)=>b.localeCompare(a));
  [document.getElementById('filter-exam'), document.getElementById('mock-filter-exam')].forEach(sel=>{
    if(!sel)return;
    sel.innerHTML = '<option value="all">全部考試</option>';
    yearOpts.forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y+' 考試';sel.appendChild(o)});
  });
  const mockPoolEl = document.getElementById('mock-pool-count');
  if(mockPoolEl) mockPoolEl.textContent = allQ.length;

  updateStats();
  if(curPage==='wrong')renderWrong();
  if(curPage==='analysis')renderAnalysis();
}

// ── localStorage ────────────────────────────────────────
function loadS(){try{return JSON.parse(localStorage.getItem(curSubj.store))||{wrongByGroup:{},totalByGroup:{},totalAnswered:0,totalCorrect:0,sessions:0}}catch{return{wrongByGroup:{},totalByGroup:{},totalAnswered:0,totalCorrect:0,sessions:0}}}
function saveS(s){localStorage.setItem(curSubj.store,JSON.stringify(s));_saveToFirestore(curSubj.store,s)}
function loadWQ(){
  try{
    const raw=localStorage.getItem(curSubj.wstore);
    if(!raw)return{};
    const parsed=JSON.parse(raw);
    if(parsed.data)return JSON.parse(parsed.data);
    return parsed;
  }catch{return{}}
}
function saveWQ(wq){localStorage.setItem(curSubj.wstore,JSON.stringify(wq));_saveToFirestore(curSubj.wstore,{data:JSON.stringify(wq)})}
function updateStats(){
  const s=loadS();
  document.getElementById('stat-done').textContent=s.totalAnswered||0;
  document.getElementById('stat-acc').textContent=s.totalAnswered>0?Math.round(s.totalCorrect/s.totalAnswered*100)+'%':'--';
}

// ── 答題 ────────────────────────────────────────────────
let quizQ=[],idx=0,score=0,answered=false,sWrong={},sTotal={},lastF='all',lastN=20;
let _timerInterval=null,_timerSec=30;
function _startTimer(q){
  clearInterval(_timerInterval);
  _timerSec=30;
  const el=document.getElementById('q-timer');
  el.className='q-timer';el.textContent=_timerSec;
  _timerInterval=setInterval(()=>{
    _timerSec--;
    el.textContent=_timerSec;
    el.className='q-timer'+(_timerSec<=10?' danger':_timerSec<=20?' warn':'');
    if(_timerSec<=0){
      clearInterval(_timerInterval);
      if(!answered){
        const od=document.getElementById('options');
        const firstBtn=od.querySelector('.option-btn');
        if(firstBtn) pick('__timeout__',q.answer,firstBtn,od,q);
      }
    }
  },1000);
}
function _stopTimer(){clearInterval(_timerInterval);}

function startQuiz(){
  const f=document.getElementById('filter-exam').value;
  const n=parseInt(document.getElementById('num-questions').value)||20;
  lastF=f;lastN=n;
  let pool=f==='all'?allQ:allQ.filter(q=>q.exam.startsWith(f));
  if(!pool.length){alert('該範圍沒有題目');return}
  quizQ=[...pool].sort(()=>Math.random()-.5).slice(0,Math.min(n,pool.length));
  idx=0;score=0;sWrong={};sTotal={};
  document.getElementById('quiz-overlay').style.background=curSubj.bg;
  document.getElementById('quiz-overlay').style.display='block';
  document.getElementById('progress-fill').style.background=curSubj.color;
  renderQ();
}

function _clearDrillMode(){
  isDrillMode=false;drillConquered=0;drillGroupName='';
  document.getElementById('drill-banner').style.display='none';
}
function quitQuiz(){
  if(idx>0&&!confirm('確定要離開？'))return;
  document.getElementById('quiz-overlay').style.display='none';
  if(isMockExam){_stopMockTimer();isMockExam=false;document.getElementById('mock-exam-timer').style.display='none';document.getElementById('q-timer').style.display='flex';}
  if(isDrillMode) _clearDrillMode();
}

function renderQ(){
  answered=false;const q=quizQ[idx],total=quizQ.length;
  document.getElementById('q-counter').textContent='第 '+(idx+1)+' / '+total+' 題';
  document.getElementById('score-live').textContent='得分 '+score;
  document.getElementById('progress-fill').style.width=(idx/total*100)+'%';
  const m=q.exam.match(/^(\d+年)/),subj=q.exam.replace(/.*[：:]\s*/,'').trim();
  document.getElementById('exam-tag').textContent=(m?m[1]+' · ':'')+subj;
  const kd=document.getElementById('kw-tags');kd.innerHTML='';
  q.groups.forEach(g=>{
    const grp=curGroups.find(x=>x.name===g)||{color:'#94a3b8'};
    const s=document.createElement('span');s.className='kw-tag';
    s.style.cssText='background:'+grp.color+'18;color:'+grp.color+';border:1px solid '+grp.color+'44';
    s.textContent=g;kd.appendChild(s);
  });
  q.groups.forEach(g=>{sTotal[g]=(sTotal[g]||0)+1});
  document.getElementById('question-text').textContent=q.question;
  const od=document.getElementById('options');od.innerHTML='';
  Object.keys(q.options).sort().forEach(k=>{
    const btn=document.createElement('button');btn.className='option-btn';
    btn.innerHTML='<span class="option-label">'+k+'</span><span>'+q.options[k]+'</span>';
    btn.onclick=()=>pick(k,q.answer,btn,od,q);od.appendChild(btn);
  });
  document.getElementById('feedback').style.display='none';
  document.getElementById('btn-next').style.display='none';
  if(isMockExam){ clearInterval(_timerInterval); } else { _startTimer(q); }
}

function pick(chosen,correct,btn,od,q){
  if(answered)return;answered=true;_stopTimer();
  const ok=chosen===correct;
  if(ok){
    score++;
    if(isDrillMode) _drillConquer(q.id); // 特訓模式：答對即征服
  } else {
    q.groups.forEach(g=>{sWrong[g]=(sWrong[g]||0)+1});
    if(!isDrillMode){ // 特訓模式不重複計入錯題次數
      const wq=loadWQ();
      if(!wq[q.id])wq[q.id]={question:q.question,options:q.options,answer:q.answer,exam:q.exam,groups:q.groups,wrongCount:0,note:''};
      wq[q.id].wrongCount++;wq[q.id].lastWrong=Date.now();saveWQ(wq);
      saveToNbAuto(curSubj.name,q);
    }
  }
  od.querySelectorAll('.option-btn').forEach(b=>{b.disabled=true;if(b.querySelector('.option-label').textContent===correct)b.classList.add(ok?'correct':'show-correct')});
  if(!ok)btn.classList.add('wrong');
  const fb=document.getElementById('feedback');fb.className='feedback '+(ok?'correct':'wrong');
  fb.textContent=ok?'✓ 答對了！':'✗ 答錯了，正確答案是 ('+correct+')';fb.style.display='block';
  document.getElementById('score-live').textContent='得分 '+score;
  const nx=document.getElementById('btn-next');nx.style.display='block';
  nx.textContent=idx+1<quizQ.length?'下一題 →':'查看結果';
}

function nextQuestion(){idx++;idx>=quizQ.length?showResult():renderQ()}

function showResult(){
  document.getElementById('quiz-overlay').style.display='none';
  if(isMockExam){_stopMockTimer();isMockExam=false;document.getElementById('mock-exam-timer').style.display='none';document.getElementById('q-timer').style.display='flex';}
  const s=loadS();s.sessions=(s.sessions||0)+1;s.totalAnswered=(s.totalAnswered||0)+quizQ.length;s.totalCorrect=(s.totalCorrect||0)+score;
  Object.entries(sWrong).forEach(([g,w])=>{s.wrongByGroup[g]=(s.wrongByGroup[g]||0)+w});
  Object.entries(sTotal).forEach(([g,t])=>{s.totalByGroup[g]=(s.totalByGroup[g]||0)+t});
  saveS(s);updateStats();
  const total=quizQ.length,pct=Math.round(score/total*100);
  const circle=document.getElementById('score-circle');
  circle.style.background=pct>=80?'#22c55e':pct>=60?'#f59e0b':'#ef4444';
  document.getElementById('final-score').textContent=pct;
  document.getElementById('result-title').textContent=pct>=80?'表現優異！':pct>=60?'繼續加油！':'還需多練習';
  const drillSuffix = isDrillMode ? '　⚔️ 征服 '+drillConquered+' 題' : '';
  document.getElementById('result-detail').textContent='答對 '+score+' 題，共 '+total+' 題（正確率 '+pct+'%）'+drillSuffix;
  if(isDrillMode) _clearDrillMode();
  document.getElementById('result-overlay').style.background=curSubj.bg;
  document.getElementById('result-overlay').style.display='block';
  document.getElementById('btn-again').style.background=curSubj.color;
  drawRadar('session-radar',sWrong,sTotal,240);
  drawWeak('session-weak',sWrong,sTotal);
}

function restartSame(){document.getElementById('result-overlay').style.display='none';document.getElementById('filter-exam').value=lastF;document.getElementById('num-questions').value=lastN;startQuiz()}
function goHome(){document.getElementById('result-overlay').style.display='none';showPage('practice')}

// ── 錯題 ────────────────────────────────────────────────
let wrongGroupFilter='all';
function renderWrong(){
  const wq=loadWQ();
  // 把 key (id) 直接附在每筆資料上，避免之後用 === 比較參考
  const entries=Object.entries(wq).map(([qid,q])=>({...q,_qid:qid}));
  document.getElementById('wrong-badge').textContent=entries.length+' 題';
  const fd=document.getElementById('wrong-filter');fd.innerHTML='';
  const groups=['all',...new Set(entries.flatMap(q=>q.groups))];
  groups.forEach(g=>{
    const chip=document.createElement('button');chip.className='filter-chip'+(g===wrongGroupFilter?' active':'');
    chip.textContent=g==='all'?'全部 ('+entries.length+')':g;
    if(g===wrongGroupFilter){chip.style.background=curSubj.color;chip.style.color='#fff'}
    chip.onclick=()=>{wrongGroupFilter=g;renderWrong()};fd.appendChild(chip);
  });
  const list=document.getElementById('wrong-list');list.innerHTML='';
  const filtered=wrongGroupFilter==='all'?entries:entries.filter(q=>q.groups.includes(wrongGroupFilter));
  if(!filtered.length){list.innerHTML='<div class="empty-msg">'+(entries.length?'這個分類沒有錯題 🎉':'還沒有錯題記錄<br>答錯的題目會自動收錄到這裡 📌')+'</div>';return}
  filtered.sort((a,b)=>(b.lastWrong||0)-(a.lastWrong||0)).forEach(q=>{
    const qid=q._qid;
    const card=document.createElement('div');card.className='wq-card';
    const yr=q.exam.match(/^(\d+年)/),subj=q.exam.replace(/.*[：:]\s*/,'').trim();
    const tagsHtml=q.groups.map(g=>{const grp=curGroups.find(x=>x.name===g)||{color:'#94a3b8'};return'<span class="kw-tag" style="background:'+grp.color+'18;color:'+grp.color+';border:1px solid '+grp.color+'44">'+g+'</span>'}).join('');
    const optsHtml=Object.keys(q.options).sort().map(k=>'<div class="wq-option'+(k===q.answer?' is-answer':'')+'"><span class="wq-option-label">'+k+'</span><span>'+q.options[k]+'</span></div>').join('');
    const hasNote=q.note&&q.note.trim();
    card.innerHTML='<div class="wq-meta"><span class="wq-exam">'+(yr?yr[1]+' · ':'')+subj+'</span><span class="wq-wrong-count">答錯 '+q.wrongCount+' 次</span></div>'
      +'<div class="wq-groups">'+tagsHtml+'</div>'
      +'<div class="wq-question">'+q.question+'</div>'
      +'<div class="wq-options">'+optsHtml+'</div>'
      +(hasNote?'<div class="wq-saved-note">📝 '+q.note+'</div>':'')
      +'<button class="wq-note-toggle" style="color:'+curSubj.color+'" onclick="toggleNote(this)">✏️ '+(hasNote?'編輯詳解':'新增詳解')+'</button>'
      +'<div class="wq-note-area"><textarea class="wq-textarea" style="border-color:#e0e0e0" placeholder="在這裡寫下筆記或詳解…">'+q.note+'</textarea>'
      +'<div class="wq-note-actions"><button class="wq-save-btn" style="background:'+curSubj.color+'" onclick="saveNote(this,\''+qid+'\')">儲存</button>'
      +'<button class="wq-del-btn" onclick="deleteWrong(\''+qid+'\')">移除錯題</button></div></div>';
    list.appendChild(card);
  });
}
function toggleNote(btn){btn.nextElementSibling.classList.toggle('open')}
function saveNote(btn,qid){const ta=btn.closest('.wq-note-area').querySelector('.wq-textarea');const wq=loadWQ();if(!wq[qid])return;wq[qid].note=ta.value;saveWQ(wq);btn.textContent='✓ 已儲存';setTimeout(()=>{btn.textContent='儲存';renderWrong()},800)}

// ── 雷達圖 ──────────────────────────────────────────────
function drawRadar(id,wg,tg,R){
  const svg=document.getElementById(id);if(!svg)return;svg.innerHTML='';
  const cx=250,cy=250,groups=curGroups.filter(g=>tg[g.name]);
  if(groups.length<3){svg.style.display='none';return}
  svg.style.display='';
  const n=groups.length,step=(2*Math.PI)/n,sa=-Math.PI/2,ns='http://www.w3.org/2000/svg';
  function pt(i,r){const a=sa+i*step;return[cx+r*Math.cos(a),cy+r*Math.sin(a)]}
  function el(t,a,p){const e=document.createElementNS(ns,t);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));if(p)p.appendChild(e);return e}
  [.2,.4,.6,.8,1].forEach(r=>el('circle',{cx,cy,r:R*r,class:'radar-grid'},svg));
  ['20%','40%','60%','80%','100%'].forEach((l,i)=>{const t=el('text',{x:cx+3,y:cy-R*(i+1)*.2+4,style:'font-size:9px;fill:#ccc;font-family:sans-serif'},svg);t.textContent=l});
  groups.forEach((_,i)=>{const[x,y]=pt(i,R);el('line',{x1:cx,y1:cy,x2:x,y2:y,class:'radar-axis'},svg)});
  const aa=el('polygon',{points:groups.map((_,i)=>pt(i,R).join(',')).join(' ')},svg);
  aa.style.fill=curSubj.color+'44';aa.style.stroke=curSubj.color;aa.style.strokeWidth='1.5';aa.style.strokeDasharray='4 3';aa.style.fillOpacity='.4';
  el('polygon',{points:groups.map((g,i)=>{const t=tg[g.name]||1,w=wg[g.name]||0;return pt(i,R*(w/t)).join(',')}).join(' '),class:'radar-area-wrong'},svg);
  groups.forEach((g,i)=>{
    const t=tg[g.name]||1,w=wg[g.name]||0,rate=w/t;
    if(w>0){const[x,y]=pt(i,R*rate);el('circle',{cx:x,cy:y,r:4,class:'radar-dot'},svg);const p=el('text',{x:x+5,y:y-5,class:'radar-pct'},svg);p.textContent=Math.round(rate*100)+'%'}
    const[lx,ly]=pt(i,R+22);const t2=el('text',{x:lx,y:ly,class:'radar-label','text-anchor':lx<cx-5?'end':lx>cx+5?'start':'middle','dominant-baseline':'middle'},svg);t2.textContent=g.name;
  });
}
function drawWeak(cid,wg,tg,append){
  const c=document.getElementById(cid);if(!c)return;
  const entries=Object.entries(wg).map(([g,w])=>({g,w,t:tg[g]||w,rate:w/(tg[g]||w)})).sort((a,b)=>b.rate-a.rate);
  if(!entries.length){const d=document.createElement('div');d.className='no-wrong';d.textContent='🎉 沒有錯誤記錄！';c.appendChild(d);return}
  entries.forEach(({g,w,t,rate})=>{
    const grp=curGroups.find(x=>x.name===g)||{color:'#94a3b8'},pct=Math.round(rate*100);
    const row=document.createElement('div');row.className='weak-item';row.style.background=grp.color+'10';
    row.innerHTML='<div class="weak-item-left"><div class="weak-dot" style="background:'+grp.color+'"></div><span class="weak-name">'+g+'</span></div>'
      +'<div class="weak-bar-wrap" style="background:'+grp.color+'18"><div class="weak-bar-fill" style="width:'+pct+'%;background:'+grp.color+'"></div></div>'
      +'<span class="weak-pct" style="color:'+grp.color+'">'+w+'/'+t+' ('+pct+'%)</span>';
    c.appendChild(row);
  });
}

function _topicColor(str){
  let h=0;for(const c of str)h=(Math.imul(31,h)+c.charCodeAt(0))|0;

  return `hsl(${hue},52%,46%)`;
}

    {name:'非營利組織與公民社會',                      kw:['非營利','NPO','NGO','第三部門','公民社會','志願服務','社會企業','基金會','協會','公益','慈善','非政府','社會資本']},
    {name:'比較行政與行政生態',                        kw:['比較行政','比較','各國行政','開發中國家','行政文化','行政生態','官僚文化','政治文化','里格斯','稜柱型','巴薩爾','農業社會','工業社會']},
  ],
};

function _matchTopic(q, topic){
  // 優先用 topic_label 精確匹配（Python 已預先分類）
  if(q.topic_label) return q.topic_label === topic.name;
  // fallback：關鍵字匹配
  const txt = (q.question||'')+Object.values(q.options||{}).join('');
  return topic.kw.some(kw=>txt.includes(kw));
}

function renderDrill(){
  const wq     = loadWQ();
  const wqList = Object.entries(wq).map(([qid,q])=>({...q,_qid:qid}));
  const chips  = document.getElementById('drill-chips');
  const hint   = document.getElementById('drill-hint');
  chips.innerHTML = '';

  // 征服數徽章（仍以錯題征服計算）
  const conquered = wqList.filter(q=>q.conquered).length;
  const badge = document.getElementById('drill-total-conquered');
  if(conquered > 0){ badge.textContent='⚔️ 已征服 '+conquered+' 題'; badge.style.display=''; }
  else badge.style.display='none';

  const topics = DRILL_TOPICS[curSubjId];
  if(!topics){
    chips.innerHTML = '<div class="drill-empty">其他科目主題特訓建置中 🔧</div>';
    hint.style.display='none'; return;
  }

  hint.style.display='none';
  topics.forEach(topic=>{
    const color = _topicColor(topic.name);
    // 從全題庫篩出這個主題的題目
    const topicQs = allQ.filter(q=>_matchTopic(q, topic));
    const total   = topicQs.length;
    // 這個主題的錯題數（從錯題本）
    const wrongCnt = wqList.filter(q=>_matchTopic(q, topic) && !q.conquered).length;

    const chip = document.createElement('button');
    chip.className = 'drill-chip' + (wrongCnt > 0 ? ' has-wrong' : '');
    chip.style.cssText = `color:${color};border-color:${color}44;background:${color}12`;

    // 主要數字顯示總題數，有錯題則另外標紅
    chip.innerHTML = topic.name
      + '<span class="drill-chip-count">'+total+'</span>'
      + (wrongCnt > 0 ? '<span style="font-size:10px;background:#ef4444;color:#fff;padding:1px 6px;border-radius:99px;font-weight:800">'+wrongCnt+'錯</span>' : '');

    chip.onclick = ()=>startDrill(topic.name, topicQs);
    chips.appendChild(chip);
  });
}

function startDrill(groupName, qs){
  isDrillMode = true;
  drillConquered = 0;
  drillGroupName = groupName;

  // 從 allQ 取題（直接使用題庫格式）
  quizQ = [...qs].sort(()=>Math.random()-.5);

  idx=0; score=0; sWrong={}; sTotal={};
  document.getElementById('quiz-overlay').style.background = curSubj.bg;
  document.getElementById('quiz-overlay').style.display = 'block';
  document.getElementById('progress-fill').style.background = curSubj.color;
  document.getElementById('mock-exam-timer').style.display = 'none';
  document.getElementById('q-timer').style.display = 'flex';

  const banner = document.getElementById('drill-banner');
  banner.style.display = 'flex';
  document.getElementById('drill-conquered-live').textContent = '⚔️ 0';

  renderQ();
}

function _drillConquer(qid){
  // 征服：在錯題本標記 conquered，並更新
  const wq = loadWQ();
  if(wq[qid]){
    wq[qid].conquered = true;
    saveWQ(wq);
  }
  drillConquered++;
  document.getElementById('drill-conquered-live').textContent = '⚔️ '+drillConquered;
}

function startMockExam(){

  if(!pool.length){alert('該範圍沒有題目');return}

  isMockExam = true;
  quizQ = [...pool].sort(()=>Math.random()-.5).slice(0, Math.min(50, pool.length));

function _startMockTimer(){
  mockTimerSec = 3600;
  clearInterval(mockTimerInterval);
  _updateMockTimerDisplay();
  mockTimerInterval = setInterval(()=>{
    mockTimerSec--;
    _updateMockTimerDisplay();
    if(mockTimerSec <= 0){
      clearInterval(mockTimerInterval);
      if(!answered){
        const od = document.getElementById('options');
        od.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
      }
      showToast('⏰ 時間到，自動交卷！');
      setTimeout(showResult, 800);
    }
  },1000);
}

function _updateMockTimerDisplay(){
  const m = Math.floor(mockTimerSec/60);
  const s = mockTimerSec % 60;
  const el = document.getElementById('mock-exam-timer');
  if(!el) return;
  el.textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  el.className = 'mock-exam-timer'+(mockTimerSec<=300?' danger':mockTimerSec<=600?' warn':'');
  el.style.display = 'flex';
}

function _stopMockTimer(){
  clearInterval(mockTimerInterval);
}

const LV_TITLES=[
  [1,  '初學者'],[11,'見習生'],[31,'學徒'],[61,'熟練者'],
  [101,'行家'],[201,'精英'],[301,'強者'],[501,'大師'],
  [701,'宗師'],[901,'傳說'],[999,'⚡ 滿級王']
];
function getLvTitle(lv){
  let title='初學者';
  for(const [min,t] of LV_TITLES){if(lv>=min)title=t;}
  return title;
}
function loadWallet(){try{const d=localStorage.getItem('nb_wallet');if(!d)return 0;const p=JSON.parse(d);return typeof p==='object'?p.amount||0:parseInt(p)||0;}catch{return 0;}}
function saveWallet(v){localStorage.setItem('nb_wallet',JSON.stringify({amount:v}));_saveToFirestore('nb_wallet',{amount:v});}
function renderWallet(){const el=document.getElementById('walletAmount');if(el)el.textContent=loadWallet().toLocaleString();}
function earnCoins(sourceEl){
  const coins=Math.floor(Math.random()*10)+1;
  saveWallet(loadWallet()+coins);
  renderWallet();
  // 浮動金幣動畫
  const pop=document.createElement('div');
  pop.className='coin-pop';
  pop.textContent='+'+coins+'元';
  const rect=sourceEl?sourceEl.getBoundingClientRect():{top:300,left:window.innerWidth/2};
  pop.style.left=(rect.left+rect.width/2-20)+'px';
  pop.style.top=(rect.top-10)+'px';
  document.body.appendChild(pop);

function loadExp(){try{const d=localStorage.getItem('nb_total_exp');if(!d)return 0;const p=JSON.parse(d);return typeof p==='object'?p.exp||0:parseInt(p)||0;}catch{return 0;}}
function saveExp(v){localStorage.setItem('nb_total_exp',JSON.stringify({exp:v}));_saveToFirestore('nb_total_exp',{exp:v});}
function calcLevel(totalExp){return Math.min(Math.floor(totalExp/100),999);}
function gainExp(amount){
  const oldExp=loadExp();
  const oldLv=calcLevel(oldExp);
  const newExp=oldExp+amount;
  const newLv=calcLevel(newExp);
  saveExp(newExp);
  renderLevel();
  if(newLv>oldLv){
    const badge=document.getElementById('lvBadge');
    if(badge){badge.classList.remove('lvup');void badge.offsetWidth;badge.classList.add('lvup');}
    showToast('🎉 升級！LV '+newLv+' '+getLvTitle(newLv));
  }
}
function renderLevel(){
  renderWallet();
  const totalExp=loadExp();
  const lv=calcLevel(totalExp);
  const expInLv=lv<999?totalExp-(lv*100):100;
  const expToNext=100;
  const pct=lv<999?Math.round(expInLv/expToNext*100):100;
  const title=getLvTitle(lv);
  const card=document.getElementById('lvCard');
  if(!card)return;
  document.getElementById('lvNum').textContent=lv;
  document.getElementById('lvTitle').textContent=title;
  document.getElementById('lvBar').style.width=pct+'%';
  document.getElementById('lvTotalExp').textContent='累計 '+totalExp+' EXP';
  if(lv>=999){
    card.classList.add('lv-999');
    document.getElementById('lvExpCur').textContent='MAX EXP';
    document.getElementById('lvNextLabel').textContent='滿級！';
  } else {
    card.classList.remove('lv-999');
    document.getElementById('lvExpCur').textContent=expInLv+' / '+expToNext+' EXP';
    document.getElementById('lvNextLabel').textContent='→ LV '+(lv+1);
  }
}

function loadAutoItems(){try{return JSON.parse(localStorage.getItem('nb_auto_items')||'[]');}catch{return[];}}

function saveToNbAuto(subj,q){

function nbDelete(id){nbItems=nbItems.filter(x=>x.id!==id);showToast('已刪除');renderNotebook();}

function nbToggleCorrectAuto(id,btn){
  const items=loadAutoItems();
  const item=items.find(x=>x.id===id);
  if(!item)return;
  item.corrected=!item.corrected;
  saveAutoItems(items);
  if(item.corrected)earnCoins(btn);
  else showToast('已取消訂正');
  renderNotebook();
}
function nbDeleteAuto(id){saveAutoItems(loadAutoItems().filter(x=>x.id!==id));showToast('已刪除');renderNotebook();}

function renderNotebook(){
  const search=document.getElementById('nbSearch').value.trim().toLowerCase();
  const filterSubj=document.getElementById('nbFilter').value;
  const filterStatus=document.getElementById('nbStatusFilter').value;
  const autoItems=loadAutoItems().map(x=>({...x,_auto:true}));
  const allItems=[...nbItems.map(x=>({...x,_auto:false})),...autoItems];
  let list=allItems.filter(x=>{
    if(filterSubj&&x.subj!==filterSubj)return false;
    if(filterStatus==='pending'&&x.corrected)return false;
    if(filterStatus==='corrected'&&!x.corrected)return false;
    if(search&&!x.q.toLowerCase().includes(search)&&!(x.note||'').toLowerCase().includes(search))return false;
    return true;
  });
  _nbCache=list;
  renderLevel();
  document.getElementById('nbCount').textContent='共 '+list.length+' 題（手動 '+nbItems.length+'，自動 '+autoItems.length+'）';
  const el=document.getElementById('nbList');
  if(!list.length){el.innerHTML='<div class="empty-msg">尚無錯題記錄<br>在題庫答錯後會自動出現在這裡</div>';return;}
  el.innerHTML=list.map((x,i)=>{
    const labels=['(A)','(B)','(C)','(D)','(E)'];
    const meta=[];
    if(x.correct)meta.push(`<span class="nb-meta-pair">正確答案：<strong>${x.correct}</strong></span>`);
    if(x.mine)meta.push(`<span class="nb-meta-pair">我的答案：<strong style="color:#ef4444">${x.mine}</strong></span>`);
    if(x.exam)meta.push(`<span class="nb-meta-pair">來源：${x.exam}</span>`);
    if(x.note)meta.push(`<span class="nb-meta-pair">備註：<strong>${x.note}</strong></span>`);
    if(x._auto&&x.wrongCount>1)meta.push(`<span class="nb-meta-pair" style="color:#ef4444">答錯 ${x.wrongCount} 次</span>`);
    const srcTag=x._auto?`<span style="font-size:10px;color:#aaa;background:#f0f0f0;padding:1px 6px;border-radius:4px">自動</span>`:'';
    const toggleFn=x._auto?`nbToggleCorrectAuto('${x.id}',this)`:`nbToggleCorrect(${x.id},this)`;
    const deleteFn=x._auto?`nbDeleteAuto('${x.id}')`:`nbDelete(${x.id})`;
    return`<div class="nb-item${x.corrected?' corrected':''}">
      <div class="nb-item-header">
        <span class="nb-item-subj">${x.subj}</span>${srcTag}
        ${x.corrected?'<span class="nb-corrected-badge">✓ 已訂正</span>':''}
        <span class="nb-item-date">${x.ts}</span>
      </div>
      <div class="nb-item-q">${x.q.replace(/</g,'&lt;')}</div>
      ${meta.length?`<div class="nb-item-meta">${meta.join('')}</div>`:''}
      <div class="nb-item-actions">
        <button class="${x.corrected?'btn-nb-uncorrect':'btn-nb-correct'}" onclick="${toggleFn}">${x.corrected?'取消訂正':'✓ 標記訂正'}</button>
        <button class="btn-anki" onclick="ankiPushOne(_nbCache[${i}])">🃏 推送</button>
        <button class="btn-nb-del" onclick="${deleteFn}">刪除</button>
      </div>
    </div>`;
  }).join('');
}

// ── Anki ────────────────────────────────────────────────
function ankiDeckName(){return document.getElementById('ankiDeck').value.trim()||'Default';}
async function ankiRequest(action,params={}){
  const r=await fetch('http://localhost:8765',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,version:6,params})});
  return r.json();
}
function buildAnkiNote(x,deck){
  const labels=['(A)','(B)','(C)','(D)','(E)'];
  let front=x.q||'';
  if(x.options&&x.options.length)front+='\n\n'+x.options.map((o,i)=>labels[i]+' '+o).join('\n');
  if(x.note)front+='\n\n【備註】'+x.note;
  let back='';
  if(x.correct){
    if(x.options){const ci=x.options.indexOf(x.correct);back=(ci>=0?labels[ci]+' ':'')+x.correct;}
    else back=x.correct;
    back='✅ 正確答案：'+back;
  }
  if(x.exam)back+='\n\n📋 來源：'+x.exam;
  if(x.subj)back+='\n🏷️ 科目：'+x.subj;
  if(x.wrongCount>1)back+='\n❌ 答錯 '+x.wrongCount+' 次';
  return{deckName:deck,modelName:'Basic',fields:{Front:front.replace(/\n/g,'<br>'),Back:back.replace(/\n/g,'<br>')},options:{allowDuplicate:false,duplicateScope:'deck'},tags:['錯題賺錢',x.subj||''].filter(Boolean)};
}
async function ankiCheckConnect(){
  const st=document.getElementById('ankiStatus');st.style.display='';st.className='anki-status';st.textContent='連線中…';
  try{const r=await ankiRequest('version');if(r.error)throw new Error(r.error);st.className='anki-status ok';st.textContent='✓ 連線成功';}
  catch(e){st.className='anki-status err';st.textContent='✗ 無法連線，請確認 Anki 已開啟且 CORS 已設定';}
}
async function ankiPushOne(x){
  try{const r=await ankiRequest('addNote',{note:buildAnkiNote(x,ankiDeckName())});
    if(r.error){if(r.error.includes('duplicate'))showToast('⚠️ 此題已在 Anki 中');else showToast('✗ '+r.error);}
    else showToast('🃏 已推送到 '+ankiDeckName());}
  catch(e){showToast('✗ 無法連線 AnkiConnect');}
}
async function ankiPushAll(){
  if(!_nbCache.length){showToast('沒有可推送的題目');return;}
  showToast('推送中…');let ok=0,dup=0,fail=0;
  for(const x of _nbCache){try{const r=await ankiRequest('addNote',{note:buildAnkiNote(x,ankiDeckName())});if(r.error){if(r.error.includes('duplicate'))dup++;else fail++;}else ok++;}catch{fail++;break;}}
  showToast(`推送完成：新增 ${ok}，重複 ${dup}，失敗 ${fail}`);
}
async function ankiPullSync(){
  const deck=ankiDeckName();showToast('同步中…');
  try{
    const findR=await ankiRequest('findNotes',{query:'tag:錯題賺錢'});
    if(findR.error)throw new Error('findNotes error: '+findR.error);
    const noteIds=findR.result||[];
    showToast('找到 '+noteIds.length+' 筆筆記');
    await new Promise(r=>setTimeout(r,1500));
    if(!noteIds.length){showToast('Anki 裡沒有標記「錯題賺錢」標籤的卡片');return;}
    const infoR=await ankiRequest('notesInfo',{notes:noteIds});
    const notes=infoR.result||[];
    const cardIdsR=await ankiRequest('findCards',{query:'tag:錯題賺錢'});
    const cardsR=await ankiRequest('cardsInfo',{cards:cardIdsR.result||[]});
    const correctedNotes=new Set();
    (cardsR.result||[]).forEach(c=>{if(c.interval>=2)correctedNotes.add(c.note);});
    const autoItems=loadAutoItems();
    let imported=0,updated=0;
    notes.forEach(note=>{
      const fieldKeys=Object.keys(note.fields||{});
      const frontKey=fieldKeys[0]||'Front';
      const backKey=fieldKeys[1]||'Back';
      const front=(note.fields[frontKey]?.value||'').replace(/<br>/g,'\n').replace(/<[^>]+>/g,'').trim();
      const back=(note.fields[backKey]?.value||'').replace(/<br>/g,'\n').replace(/<[^>]+>/g,'').trim();
      if(!front)return;
      const correctMatch=back.match(/正確答案：(.+)/);const subjMatch=back.match(/科目：(.+)/);
      const correct=correctMatch?correctMatch[1].trim():'';const subj=subjMatch?subjMatch[1].trim():'（Anki 匯入）';
      const isCorrected=correctedNotes.has(note.noteId);
      const ts=new Date().toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
      const autoIdx=autoItems.findIndex(x=>x.q&&front.startsWith(x.q.substring(0,30)));
      if(autoIdx>=0){autoItems[autoIdx].corrected=isCorrected;updated++;return;}
      const nbIdx=nbItems.findIndex(x=>x.q&&front.startsWith(x.q.substring(0,30)));
      if(nbIdx>=0){nbItems[nbIdx].corrected=isCorrected;updated++;return;}
      nbItems.unshift({id:Date.now()+Math.random(),subj,q:front,correct,mine:'',note:'',ts,corrected:isCorrected,source:'anki'});gainExp(10);imported++;
    });
    saveAutoItems(autoItems);
    showToast(`同步完成：新匯入 ${imported}，更新 ${updated}`);renderNotebook();
  }catch(e){showToast('✗ 同步失敗：'+(e.message.includes('fetch')?'請確認 Anki 已開啟':e.message));}
}
